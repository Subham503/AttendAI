<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mark Attendance — SmartAttend</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neon-cyan: #00fff7;
      --neon-pink: #ff00e5;
      --neon-green: #00ff64;
      --neon-amber: #ffb300;
      --dark: #020810;
      --text: #c8e6ff;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--dark);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 255, 247, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 247, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 60px 60px;
      }
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0.1;
    }

    .glow-orb.cyan {
      width: 500px;
      height: 500px;
      background: var(--neon-cyan);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.07) 2px, rgba(0, 0, 0, 0.07) 4px);
      pointer-events: none;
      z-index: 1;
    }

    .corner {
      position: fixed;
      width: 50px;
      height: 50px;
      z-index: 2;
      opacity: 0.3;
    }

    .corner.tl {
      top: 16px;
      left: 16px;
      border-top: 2px solid var(--neon-cyan);
      border-left: 2px solid var(--neon-cyan);
    }

    .corner.tr {
      top: 16px;
      right: 16px;
      border-top: 2px solid var(--neon-cyan);
      border-right: 2px solid var(--neon-cyan);
    }

    .corner.bl {
      bottom: 16px;
      left: 16px;
      border-bottom: 2px solid var(--neon-cyan);
      border-left: 2px solid var(--neon-cyan);
    }

    .corner.br {
      bottom: 16px;
      right: 16px;
      border-bottom: 2px solid var(--neon-cyan);
      border-right: 2px solid var(--neon-cyan);
    }

    .page {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(1000px, 95vw);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(0, 255, 247, 0.5);
      letter-spacing: 2px;
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--neon-cyan);
    }

    .back-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }

    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--neon-cyan), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(0, 255, 100, 0.7);
      letter-spacing: 2px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ff64;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    .main-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      width: min(1000px, 95vw);
    }

    /* Camera */
    .camera-panel {
      flex: 1;
      background: rgba(5, 15, 30, 0.8);
      border: 1px solid rgba(0, 255, 247, 0.2);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .camera-feed {
      width: 100%;
      display: block;
      aspect-ratio: 4/3;
      object-fit: cover;
      transform: scaleX(-1);
    }

    video.camera-feed {
      background: #000;
    }

    .scan-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      opacity: 0;
    }

    .scan-line.active {
      opacity: 0.6;
      animation: scanLine 1.5s ease-in-out infinite;
    }

    @keyframes scanLine {
      0% {
        top: 0;
        opacity: 0;
      }

      10% {
        opacity: 0.6;
      }

      90% {
        opacity: 0.6;
      }

      100% {
        top: 100%;
        opacity: 0;
      }
    }

    .corner-bracket {
      position: absolute;
      width: 30px;
      height: 30px;
    }

    .corner-bracket.tl {
      top: 16px;
      left: 16px;
      border-top: 2px solid var(--neon-cyan);
      border-left: 2px solid var(--neon-cyan);
    }

    .corner-bracket.tr {
      top: 16px;
      right: 16px;
      border-top: 2px solid var(--neon-cyan);
      border-right: 2px solid var(--neon-cyan);
    }

    .corner-bracket.bl {
      bottom: 16px;
      left: 16px;
      border-bottom: 2px solid var(--neon-cyan);
      border-left: 2px solid var(--neon-cyan);
    }

    .corner-bracket.br {
      bottom: 16px;
      right: 16px;
      border-bottom: 2px solid var(--neon-cyan);
      border-right: 2px solid var(--neon-cyan);
    }

    .cam-status {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 255, 247, 0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--neon-cyan);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Liveness overlay */
    .liveness-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(2, 8, 16, 0.6);
      backdrop-filter: blur(2px);
      transition: opacity 0.5s;
      z-index: 3;
    }

    .liveness-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .liveness-icon {
      font-size: 44px;
      animation: eyePulse 1.2s ease-in-out infinite;
    }

    @keyframes eyePulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    .liveness-text {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--neon-cyan);
      text-align: center;
    }

    .liveness-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(200, 230, 255, 0.4);
      letter-spacing: 2px;
    }

    .ear-bar-wrap {
      width: 160px;
      height: 4px;
      background: rgba(0, 255, 247, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .ear-bar {
      height: 100%;
      width: 50%;
      background: var(--neon-cyan);
      border-radius: 4px;
      transition: width 0.08s, background 0.15s;
    }

    /* Scanning pulse ring */
    .scan-pulse {
      position: absolute;
      inset: 0;
      border: 3px solid var(--neon-green);
      border-radius: 16px;
      opacity: 0;
      pointer-events: none;
    }

    .scan-pulse.active {
      animation: pulsRing 1s ease-out infinite;
    }

    @keyframes pulsRing {
      0% {
        opacity: 0.6;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.02);
      }
    }

    /* Name overlay on camera */
    .name-overlay {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 100, 0.15);
      border: 1px solid rgba(0, 255, 100, 0.5);
      border-radius: 20px;
      padding: 6px 20px;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      color: var(--neon-green);
      letter-spacing: 2px;
      display: none;
      z-index: 4;
      animation: namePop 0.3s ease;
    }

    .name-overlay.show {
      display: block;
    }

    @keyframes namePop {
      from {
        transform: translateX(-50%) scale(0.8);
        opacity: 0;
      }

      to {
        transform: translateX(-50%) scale(1);
        opacity: 1;
      }
    }

    .flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    .flash.active {
      opacity: 0.3;
    }

    /* Right panel */
    .controls-panel {
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-card {
      background: rgba(5, 15, 30, 0.85);
      border: 1px solid rgba(0, 255, 247, 0.2);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-card-title {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(0, 255, 247, 0.5);
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0, 255, 247, 0.1);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(0, 255, 247, 0.5);
    }

    input {
      background: rgba(0, 255, 247, 0.03);
      border: 1px solid rgba(0, 255, 247, 0.15);
      border-radius: 8px;
      padding: 9px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
      width: 100%;
    }

    input:focus {
      border-color: rgba(0, 255, 247, 0.5);
      background: rgba(0, 255, 247, 0.06);
    }

    input::placeholder {
      color: rgba(200, 230, 255, 0.2);
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background: rgba(5, 15, 30, 0.8);
      border: 1px solid rgba(0, 255, 247, 0.15);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--neon-cyan);
    }

    .stat-num.green {
      color: var(--neon-green);
    }

    .stat-lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: rgba(200, 230, 255, 0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Buttons */
    .start-btn {
      width: 100%;
      background: rgba(0, 255, 100, 0.08);
      border: 1px solid rgba(0, 255, 100, 0.5);
      border-radius: 12px;
      padding: 14px;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--neon-green);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .start-btn:hover:not(:disabled) {
      background: rgba(0, 255, 100, 0.15);
      box-shadow: 0 0 30px rgba(0, 255, 100, 0.2);
    }

    .start-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .start-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
    }

    .stop-btn {
      width: 100%;
      background: rgba(255, 68, 85, 0.08);
      border: 1px solid rgba(255, 68, 85, 0.5);
      border-radius: 12px;
      padding: 14px;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ff4455;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      display: none;
    }

    .stop-btn:hover {
      background: rgba(255, 68, 85, 0.15);
      box-shadow: 0 0 30px rgba(255, 68, 85, 0.2);
    }

    .stop-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
    }

    /* Marked list */
    .marked-card {
      background: rgba(5, 15, 30, 0.85);
      border: 1px solid rgba(0, 255, 247, 0.15);
      border-radius: 12px;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .marked-header {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(0, 255, 247, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .marked-title {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(0, 255, 247, 0.5);
    }

    .marked-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--neon-green);
      letter-spacing: 1px;
    }

    .marked-list {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      max-height: 180px;
    }

    .marked-list::-webkit-scrollbar {
      width: 3px;
    }

    .marked-list::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 247, 0.15);
      border-radius: 2px;
    }

    .marked-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(0, 255, 100, 0.05);
      border: 1px solid rgba(0, 255, 100, 0.15);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .marked-item.skipped {
      background: rgba(255, 179, 0, 0.05);
      border-color: rgba(255, 179, 0, 0.2);
    }

    .marked-item.unknown {
      background: rgba(255, 68, 85, 0.05);
      border-color: rgba(255, 68, 85, 0.2);
    }

    .marked-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon-green);
      flex-shrink: 0;
    }

    .marked-dot.skipped {
      background: var(--neon-amber);
    }

    .marked-dot.unknown {
      background: #ff4455;
    }

    .marked-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(200, 230, 255, 0.8);
      flex: 1;
    }

    .marked-time {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: rgba(200, 230, 255, 0.3);
    }

    .empty-list {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(200, 230, 255, 0.2);
      text-align: center;
      padding: 20px;
      letter-spacing: 1px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(5, 15, 30, 0.95);
      border: 1px solid rgba(0, 255, 100, 0.4);
      border-radius: 12px;
      padding: 12px 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--neon-green);
      letter-spacing: 1px;
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      opacity: 0;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error {
      border-color: rgba(255, 68, 85, 0.4);
      color: #ff4455;
    }

    canvas {
      display: none;
    }
  </style>
</head>

<body>
  <div class="grid-bg"></div>
  <div class="glow-orb cyan"></div>
  <div class="scanlines"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="page">
    <div class="top-bar">
      <a href="/" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Back
      </a>
      <div class="page-title">Face Scanner</div>
      <div class="live-badge">
        <div class="live-dot"></div>LIVE
      </div>
    </div>

    <div class="main-layout">
      <!-- Camera -->
      <div class="camera-panel">
        <video id="videoFeed" class="camera-feed" autoplay playsinline muted></video>

        <!-- Liveness overlay -->
        <div class="liveness-overlay" id="livenessOverlay">
          <div class="liveness-icon">👁️</div>
          <div class="liveness-text">Blink to Verify</div>
          <div class="liveness-sub">One-time anti-spoofing check</div>
          <div class="ear-bar-wrap">
            <div class="ear-bar" id="earBar"></div>
          </div>
        </div>

        <!-- Name overlay -->
        <div class="name-overlay" id="nameOverlay"></div>

        <!-- Scan pulse ring -->
        <div class="scan-pulse" id="scanPulse"></div>

        <div class="flash" id="flash"></div>
        <div class="scan-overlay">
          <div class="scan-line" id="scanLine"></div>
          <div class="corner-bracket tl"></div>
          <div class="corner-bracket tr"></div>
          <div class="corner-bracket bl"></div>
          <div class="corner-bracket br"></div>
        </div>
        <div class="cam-status">
          <div class="live-dot"></div><span id="camStatusText">INITIALIZING</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-panel">

        <!-- Session details -->
        <div class="form-card">
          <div class="form-card-title">Session Details</div>
          <div class="field">
            <label>Subject</label>
            <input type="text" id="subjectInput" placeholder="e.g. Mathematics" value="{{ subject }}" />
          </div>
          <div class="field">
            <label>Department</label>
            <input type="text" id="deptInput" placeholder="e.g. CSE" value="{{ department }}" />
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num green" id="markedCount">0</div>
            <div class="stat-lbl">Marked</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="scanCount">0</div>
            <div class="stat-lbl">Scans</div>
          </div>
        </div>

        <!-- Start/Stop buttons -->
        <button class="start-btn" id="startBtn" onclick="startScanning()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          Start Scanning
        </button>
        <button class="stop-btn" id="stopBtn" onclick="stopScanning()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
          </svg>
          Stop Scanning
        </button>

        <!-- Marked list -->
        <div class="marked-card">
          <div class="marked-header">
            <div class="marked-title">Attendance Log</div>
            <div class="marked-count" id="markedCountHeader">0 marked</div>
          </div>
          <div class="marked-list" id="markedList">
            <div class="empty-list">No attendance marked yet</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <canvas id="captureCanvas"></canvas>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <script>
    const video = document.getElementById('videoFeed');
    const canvas = document.getElementById('captureCanvas');
    const camStatusText = document.getElementById('camStatusText');
    const toast = document.getElementById('toast');
    const flash = document.getElementById('flash');
    const scanLine = document.getElementById('scanLine');
    const livenessOverlay = document.getElementById('livenessOverlay');
    const earBar = document.getElementById('earBar');
    const nameOverlay = document.getElementById('nameOverlay');
    const scanPulse = document.getElementById('scanPulse');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const markedList = document.getElementById('markedList');
    const markedCount = document.getElementById('markedCount');
    const markedCountHdr = document.getElementById('markedCountHeader');
    const scanCount = document.getElementById('scanCount');

    // MediaPipe
    const LEFT_EYE = [362, 385, 387, 263, 373, 380];
    const RIGHT_EYE = [33, 160, 158, 133, 153, 144];
    const EAR_THRESHOLD = 0.20;
    const CONSEC_FRAMES = 2;
    const SCAN_INTERVAL = 3000; // scan every 3 seconds

    let livenessVerified = false;
    let eyeClosedFrames = 0;
    let scanning = false;
    let scanTimer = null;
    let totalMarked = 0;
    let totalScans = 0;

    function dist(p1, p2) { return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2); }
    function calcEAR(lm, idx) {
      const [p1, p2, p3, p4, p5, p6] = idx.map(i => lm[i]);
      return (dist(p2, p6) + dist(p3, p5)) / (2.0 * dist(p1, p4));
    }

    const faceMesh = new FaceMesh({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(results => {
      if (livenessVerified) return;
      if (!results.multiFaceLandmarks?.length) { earBar.style.width = '0%'; return; }
      const lm = results.multiFaceLandmarks[0];
      const avgEAR = (calcEAR(lm, LEFT_EYE) + calcEAR(lm, RIGHT_EYE)) / 2;
      earBar.style.width = Math.min(100, (avgEAR / 0.35) * 100) + '%';
      earBar.style.background = avgEAR < EAR_THRESHOLD ? '#ff4455' : 'var(--neon-cyan)';
      if (avgEAR < EAR_THRESHOLD) { eyeClosedFrames++; }
      else { if (eyeClosedFrames >= CONSEC_FRAMES) confirmLiveness(); eyeClosedFrames = 0; }
    });

    function confirmLiveness() {
      livenessVerified = true;
      livenessOverlay.classList.add('hidden');
      startBtn.disabled = false;
      camStatusText.textContent = 'READY';
      showToast('✅ Liveness verified! Press Start Scanning.', false);
    }

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          camStatusText.textContent = 'BLINK NOW';
        };
        const mpCam = new Camera(video, {
          onFrame: async () => { if (!livenessVerified) await faceMesh.send({ image: video }); },
          width: 1280, height: 720
        });
        mpCam.start();
      } catch (err) {
        camStatusText.textContent = 'ERROR';
        showToast('Camera access denied.', true);
      }
    }

    function startScanning() {
      const subject = document.getElementById('subjectInput').value.trim() || 'General';
      const dept = document.getElementById('deptInput').value.trim() || 'General';
      if (!subject || !dept) { showToast('Fill subject and department first.', true); return; }

      scanning = true;
      startBtn.style.display = 'none';
      stopBtn.style.display = 'flex';
      scanLine.classList.add('active');
      scanPulse.classList.add('active');
      camStatusText.textContent = 'SCANNING';
      showToast('🔍 Auto-scanning started. Students step in!', false);

      // Scan immediately then every SCAN_INTERVAL
      autoScan();
      scanTimer = setInterval(autoScan, SCAN_INTERVAL);
    }

    function stopScanning() {
      scanning = false;
      clearInterval(scanTimer);
      scanTimer = null;
      startBtn.style.display = 'flex';
      stopBtn.style.display = 'none';
      scanLine.classList.remove('active');
      scanPulse.classList.remove('active');
      camStatusText.textContent = 'STOPPED';
      showToast(`Session ended. ${totalMarked} student(s) marked.`, false);
    }

    async function autoScan() {
      if (!scanning) return;
      const subject = document.getElementById('subjectInput').value.trim() || 'General';
      const dept = document.getElementById('deptInput').value.trim() || 'General';

      // Capture frame
      const ctx = canvas.getContext('2d');
      ctx.save(); ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height); ctx.restore();
      const imageData = canvas.toDataURL('image/jpeg', 0.85);

      // Flash
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 100);

      totalScans++;
      scanCount.textContent = totalScans;

      try {
        const res = await fetch('/mark_attendance', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: imageData, subject, department: dept })
        });
        const result = await res.json();
        const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        if (result.success) {
          // Extract name from message "✅ Marked: Name"
          const name = result.message.replace('✅ Marked: ', '');
          addToLog(name, time, 'marked');
          showNameOverlay('✅ ' + name);
          totalMarked++;
          markedCount.textContent = totalMarked;
          markedCountHdr.textContent = totalMarked + ' marked';
        } else if (result.message.includes('Already marked')) {
          const name = result.message.replace('⚠️ Already marked today: ', '');
          addToLog(name, time, 'skipped');
          showNameOverlay('⚠️ ' + name);
        } else if (result.message.includes('No face')) {
          // No face — silent, don't spam log
        } else {
          addToLog('Unknown', time, 'unknown');
        }
      } catch (err) {
        console.error('Scan error:', err);
      }
    }

    function addToLog(name, time, type) {
      // Remove empty state
      const empty = markedList.querySelector('.empty-list');
      if (empty) empty.remove();

      const item = document.createElement('div');
      item.className = 'marked-item' + (type === 'skipped' ? ' skipped' : type === 'unknown' ? ' unknown' : '');
      item.innerHTML = `
      <div class="marked-dot${type === 'skipped' ? ' skipped' : type === 'unknown' ? ' unknown' : ''}"></div>
      <div class="marked-name">${name}</div>
      <div class="marked-time">${time}</div>
    `;
      markedList.prepend(item);
    }

    function showNameOverlay(text) {
      nameOverlay.textContent = text;
      nameOverlay.classList.add('show');
      setTimeout(() => nameOverlay.classList.remove('show'), 2000);
    }

    function showToast(msg, isError = false) {
      toast.textContent = msg;
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    initCamera();
  </script>
</body>

</html>
